name: Deploy to Office Mac

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: lets-bounce.app
          username: samanthagoodhue
          key: ${{ secrets.OFFICE_MAC_SSH_KEY }}
          script: |
            cd ~/letsbounce
            git pull origin main
            npm install --legacy-peer-deps
            npm run build
            pm2 restart all || pm2 start npm --name "frontend" -- run preview
