# Deploy to your Office Mac via SSH. Requires:
# - Secrets: OFFICE_MAC_SSH_KEY (full private key with -----BEGIN/END----- and newlines),
#            and optionally OFFICE_MAC_SSH_HOST if not using the default.
# - Host must be the Mac's SSH hostname or IP (reachable on port 22 from the internet).
#   Do NOT use your app domain (e.g. lets-bounce.app) if it points to GitHub Pages.
name: Deploy to Office Mac

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate SSH secret
        run: |
          if [ -z "${{ secrets.OFFICE_MAC_SSH_KEY }}" ]; then
            echo "::error::OFFICE_MAC_SSH_KEY is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if ! echo "${{ secrets.OFFICE_MAC_SSH_KEY }}" | head -1 | grep -q "BEGIN.*PRIVATE KEY"; then
            echo "::error::OFFICE_MAC_SSH_KEY must be the full PEM key (include -----BEGIN ... PRIVATE KEY----- and -----END ... PRIVATE KEY----- with newlines)."
            exit 1
          fi
          echo "SSH key secret is present and looks like a PEM key."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.OFFICE_MAC_SSH_HOST || 'lets-bounce.app' }}
          username: samanthagoodhue
          key: ${{ secrets.OFFICE_MAC_SSH_KEY }}
          script: |
            cd ~/letsbounce
            git pull origin main
            npm install --legacy-peer-deps
            npm run build
            pm2 restart all || pm2 start npm --name "frontend" -- run preview
